name: Deploy PuntroSales Backend

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_KEY: ${{ secrets.DEPLOY_KEY }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      FIREBASE_SERVICE_ACCOUNT_BASE64: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BASE64 }}
      INTERNAL_API_TOKEN: ${{ secrets.INTERNAL_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Deploy to NGINX server
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" \
            -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "mkdir -p '$DEPLOY_PATH'"

          rsync -az --delete \
            --exclude ".git" \
            --exclude ".github" \
            --exclude ".env" \
            --exclude ".DS_Store" \
            --exclude "node_modules" \
            -e "ssh -i ~/.ssh/deploy_key -p $DEPLOY_PORT -o StrictHostKeyChecking=no" \
            ./ "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/"

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" \
            -o StrictHostKeyChecking=no \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd '$DEPLOY_PATH' && \
             printf '%s\n' \
               'PORT=8081' \
               'NODE_ENV=production' \
               'FIRESTORE_CATALOG_COLLECTION=catalog_public_routes' \
               'FIRESTORE_DATABASE_ID=puntrosales' \
               'CATALOG_METADATA_TTL_SECONDS=60' \
               \"FIREBASE_PROJECT_ID=$FIREBASE_PROJECT_ID\" \
               \"FIREBASE_SERVICE_ACCOUNT_BASE64=$FIREBASE_SERVICE_ACCOUNT_BASE64\" \
               \"INTERNAL_API_TOKEN=$INTERNAL_API_TOKEN\" \
               > .env && \
             npm install --omit=dev && \
             if ! command -v pm2 >/dev/null 2>&1; then sudo npm install -g pm2; fi && \
             pm2 startOrRestart ecosystem.config.cjs && \
             pm2 save"
